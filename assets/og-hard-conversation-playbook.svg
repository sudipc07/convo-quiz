<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="1200" viewBox="0 0 1200 1200" role="img" aria-labelledby="title desc">
  <title id="title">The Hard Conversation Playbook</title>
  <desc id="desc">A dark cover card for The Hard Conversation Playbook, word-for-word scripts for the 12 moments every manager dreads.</desc>
  <rect width="1200" height="1200" fill="#0f1116"/>
  <text x="90" y="108" fill="#d8bb47" font-family="Inter, Arial, sans-serif" font-size="19" font-weight="500" letter-spacing="1.4">
    A PLAYBOOK FOR MANAGERS
  </text>
  <g fill="#f5f5f3" font-family="Inter, Arial, sans-serif" font-weight="800" letter-spacing="11">
    <text x="88" y="421" font-size="108">THE HARD</text>
    <text x="88" y="547" font-size="108">CONVERSATION</text>
    <text x="88" y="672" font-size="108">PLAYBOOK</text>
  </g>
  <rect x="90" y="734" width="101" height="4" fill="#d8bb47"/>
  <g fill="#b8b8bc" font-family="Georgia, 'Times New Roman', serif" font-size="40" font-style="italic">
    <text x="90" y="808">Word-for-word scripts</text>
