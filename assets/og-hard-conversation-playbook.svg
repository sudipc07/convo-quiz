  <text x="620" y="1040" fill="#24241d" font-family="Georgia, 'Times New Roman', serif" font-size="560" font-weight="800">12</text>
  <text x="90" y="1142" fill="#949499" font-family="Inter, Arial, sans-serif" font-size="23" font-weight="800" letter-spacing="1.6">
    SUDIPTO CHANDA
  </text>
